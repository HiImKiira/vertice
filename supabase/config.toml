# Configuración local de Supabase para Vértice
# Documentación: https://supabase.com/docs/guides/local-development/cli/config

project_id = "vertice"

[api]
enabled = true
port = 54321
schemas = ["public"]
extra_search_path = ["public", "extensions"]
max_rows = 1000

[db]
port = 54322
shadow_port = 54320
major_version = 15

[studio]
enabled = true
port = 54323

[auth]
enabled = true
site_url = "http://localhost:3000"
additional_redirect_urls = [
  "http://localhost:3000/auth/callback",
  "vertice://auth/callback"
]
jwt_expiry = 3600
enable_refresh_token_rotation = true
refresh_token_reuse_interval = 10
enable_signup = false

[auth.email]
enable_signup = false
double_confirm_changes = true
enable_confirmations = true

[storage]
enabled = true
file_size_limit = "5MiB"

[realtime]
enabled = true

[inbucket]
enabled = true
port = 54324
